# Diagnostic 2θ regions (Cu Kα ~1.5406 Å) — lime mortar carbonation, aggregates, aluminosilicates.
# Peaks are indicative; use full pattern, chemistry, and sample prep for identification.
version: "0.1"
assumptions:
  radiation: "Cu Kα"
  wavelength_angstrom: 1.5406
  note: >-
    Angles follow the project laboratory phase table for lime-based binders and typical powder
    databases (e.g. ICDD PDFs). Overlapping windows (e.g. quartz vs. aragonite near 26–27°) require
    full-pattern interpretation. d-spacings shift with solid solution and strain.
minerals:
  - id: portlandite_18
    label: "Portlandite (18–18.5° 2θ)"
    two_theta_min: 18.0
    two_theta_max: 18.5
    source: "Laboratory phase table (lime mortar / carbonation)"
    notes: "Residual or unreacted lime."

  - id: calcite_22p5_23p5
    label: "Calcite (22.5–23.5° 2θ)"
    two_theta_min: 22.5
    two_theta_max: 23.5
    source: "Laboratory phase table (lime mortar / carbonation)"
    notes: "Carbonated lime phase."

  - id: vaterite_24p5_25p5
    label: "Vaterite (24.5–25.5° 2θ)"
    two_theta_min: 24.5
    two_theta_max: 25.5
    source: "Laboratory phase table (lime mortar / carbonation)"
    notes: "Metastable calcium carbonate phase."

